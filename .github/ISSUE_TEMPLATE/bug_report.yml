name: Bug report
description: Report a reproducible problem in Personal Ledger Pro.
title: "[Bug]: "
labels:
  - bug
body:
  - type: input
    id: version
    attributes:
      label: App version or commit
      description: Include the release version or commit hash where the bug occurs.
      placeholder: "v0.1.0 or abc1234"
    validations:
      required: true
  - type: input
    id: linux-version
    attributes:
      label: Debian/Linux version
      placeholder: "Debian 12, Ubuntu 24.04, Linux Mint 22"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "Python 3.11.8"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open...\n2. Click...\n3. See..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant logs only. Remove private data before posting.
      render: text
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Add screenshots only if they use fake or anonymized data.
  - type: checkboxes
    id: privacy
    attributes:
      label: Data privacy confirmation
      options:
        - label: I confirm that all data, logs, and screenshots in this issue are fake or anonymized.
          required: true
